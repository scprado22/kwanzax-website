<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export KwanzaX Logo</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: #1e3a8a;
            margin-bottom: 30px;
        }
        .logo-preview {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #logoCanvas {
            border: 1px solid #e5e7eb;
        }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }
        input, select {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        .info {
            background: #dbeafe;
            padding: 16px;
            border-radius: 8px;
            color: #1e40af;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Exportar Logo KwanzaX</h1>

        <div class="controls">
            <div class="control-group">
                <label for="size">Tamanho (px)</label>
                <input type="number" id="size" value="512" min="64" max="2048" step="64">
            </div>
            <div class="control-group">
                <label for="bgColor">Cor de Fundo</label>
                <select id="bgColor">
                    <option value="white">Branco</option>
                    <option value="transparent">Transparente</option>
                    <option value="#1e3a8a">Azul</option>
                    <option value="black">Preto</option>
                </select>
            </div>
            <div class="control-group">
                <label for="logoColor">Cor do Logo</label>
                <select id="logoColor">
                    <option value="#2563eb">Azul (Padrão)</option>
                    <option value="white">Branco</option>
                    <option value="black">Preto</option>
                    <option value="#1e3a8a">Azul Escuro</option>
                </select>
            </div>
        </div>

        <div class="logo-preview">
            <canvas id="logoCanvas"></canvas>
        </div>

        <button onclick="downloadLogo()">📥 Download Logo (PNG)</button>

        <div class="info">
            <strong>💡 Dica:</strong> Ajusta o tamanho e as cores acima antes de fazer download.
            Para logos em fundos escuros, usa logo branco. Para fundos claros, usa logo azul.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d');
        const sizeInput = document.getElementById('size');
        const bgColorInput = document.getElementById('bgColor');
        const logoColorInput = document.getElementById('logoColor');

        function drawLogo() {
            const size = parseInt(sizeInput.value);
            canvas.width = size;
            canvas.height = size;

            const bgColor = bgColorInput.value;
            const logoColor = logoColorInput.value;

            // Background
            if (bgColor !== 'transparent') {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, size, size);
            } else {
                ctx.clearRect(0, 0, size, size);
            }

            // Draw K logo
            ctx.fillStyle = logoColor;
            ctx.font = `bold ${size * 0.7}px system-ui, -apple-system, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('K', size / 2, size / 2);
        }

        function downloadLogo() {
            const size = parseInt(sizeInput.value);
            const bgColor = bgColorInput.value;
            const logoColor = logoColorInput.value;

            const link = document.createElement('a');
            link.download = `kwanzax-logo-${size}px.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Update logo when controls change
        sizeInput.addEventListener('change', drawLogo);
        bgColorInput.addEventListener('change', drawLogo);
        logoColorInput.addEventListener('change', drawLogo);

        // Initial draw
        drawLogo();
    </script>
</body>
</html>
